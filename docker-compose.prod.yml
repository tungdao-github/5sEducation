services:
  postgres:
    image: postgres:16-alpine
    container_name: udemyclone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: udemyclone-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DbProvider: ${DB_PROVIDER}
      DATABASE_URL: ${POSTGRES_URL}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Key: ${JWT_KEY}
      Frontend__BaseUrl: ${SITE_URL}
      FRONTEND_BASE_URL: ${SITE_URL}
      Cors__Origins__0: ${SITE_URL}
      ForwardedHeaders__Enabled: "true"
      Seed__DefaultPassword: ${SEED_DEFAULT_PASSWORD}
      Seed__AutoConfirmEmails: "false"
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL}
      Seed__InstructorEmail: ${SEED_INSTRUCTOR_EMAIL}
      Seed__UserEmail: ${SEED_USER_EMAIL}
      CloudflareStream__AccountId: ${CLOUDFLARE_STREAM_ACCOUNT_ID:-}
      CloudflareStream__ApiToken: ${CLOUDFLARE_STREAM_API_TOKEN:-}
      CloudflareStream__CustomerCode: ${CLOUDFLARE_STREAM_CUSTOMER_CODE:-}
      GoogleAuth__ClientId: ${GOOGLE_AUTH_CLIENT_ID:-}
      FacebookAuth__AppId: ${FACEBOOK_AUTH_APP_ID:-}
      FacebookAuth__AppSecret: ${FACEBOOK_AUTH_APP_SECRET:-}
    volumes:
      - api_dpkeys:/root/.aspnet/DataProtection-Keys
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL}
    container_name: udemyclone-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      INTERNAL_API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      NEXT_PUBLIC_FACEBOOK_GRAPH_VERSION: ${NEXT_PUBLIC_FACEBOOK_GRAPH_VERSION:-v20.0}
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    container_name: udemyclone-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app

networks:
  app:

volumes:
  postgres_data:
  api_dpkeys:
  caddy_data:
  caddy_config:
